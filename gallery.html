<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .gallery-container {
            display: flex;
            width: 100%;
            height: 600px;
            gap: 10px;
            overflow: hidden;
            padding: 20px;
            background: white;
        }

        .gallery-item {
            position: relative;
            flex: 1;
            height: 100%;
            overflow: hidden;
            cursor: pointer;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1);
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            opacity: 0;
            transform: translateY(20px);
        }
    </style>
</head>

<body>
    <div class="gallery-container">
        <div class="gallery-item">
            <img src="images/bg-1.jpg" alt="1">
            <div class="info">
                <h3>가은님</h3>
                <p>메롱</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="images/bg-2.jpg" alt="2">
            <div class="info">
                <h3>가은님</h3>
                <p>메롱</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="images/bg-3.jpg" alt="3">
            <div class="info">
                <h3>가은님</h3>
                <p>메롱</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="images/bg-4.jpg" alt="4">
            <div class="info">
                <h3>가은님</h3>
                <p>메롱</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <!-- RoughEase, ExpoScaleEase and SlowMo are all included in the EasePack file -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/EasePack.min.js"></script>
    <script>
        $(document).ready(function () {
            gsap.registerPlugin(EasePack);

            $('.gallery-item').each(function () {
                const $item = $(this);
                const $img = $item.find('img');
                const $info = $item.find('.info');

                $item.on('mouseenter', function () {
                    const tl = gsap.timeline();

                    tl.to($img, {
                        duration: 0.4,
                        scale: 1.2,
                        x: 5,
                        y: -5,
                        ease: "elastic.out(1, 0.3)"
                    })
                        .to($item, {
                            duration: 0.6,
                            flex: 5,
                            ease: "power4.inOut"
                        }, "-=0.2");
                });

                $item.on('mouseleave', function () {
                    gsap.to($item, {
                        duration: 0.6,
                        flex: 1,
                        ease: "power2.inOut"
                    });

                    gsap.to($img, {
                        duration: 0.6,
                        scale: 1.1,
                        x: 0,
                        y: 0,
                        ease: "power2.inOut"
                    });

                    gsap.to($info, {
                        duration: 0.3,
                        opacity: 0,
                        y: 20,
                        ease: "power2.in"
                    })
                })
            })
        })
    </script>
</body>

</html>
