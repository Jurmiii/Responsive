<body>
    <div class="box" data-aos="zoom-out-right" style="background-color: red;"></div>
    <div class="box" data-aos="zoom-out-left" style="background-color: orange;"></div>
    <div class="box"  data-aos="fade-up" data-aos-duration="3000" style="background-color: yellow;"></div>
    <div class="box" data-aos="fade-down"
     data-aos-easing="linear" data-aos-duration="1500" style="background-color: green;"></div>
    <div class="box" data-aos="fade-right"
     data-aos-offset="300"
     data-aos-easing="ease-in-sine" style="background-color: blue;"></div>
    <div class="box" data-aos="fade-left"
     data-aos-anchor="#example-anchor"
     data-aos-offset="500" data-aos-duration="500" style="background-color: navy;"></div>
    <div class="box" data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0" style="background-color: purple;"></div>
    <div class="box" data-aos="fade-down-left" style="background-color: pink;"></div>
    <div class="box" data-aos="flip-left" style="background-color: plum;"></div>
    <div class="box" data-aos="flip-right" style="background-color: palevioletred;"></div>
    <div class="box" data-aos="flip-up" style="background-color: red;"></div>
    <div class="box" data-aos="flip-down" style="background-color: orange;"></div>
    <div class="box" data-aos="zoom-in" style="background-color: yellow;"></div>
    <div class="box" data-aos="zoom-in-up" style="background-color: green;"></div>
    <div class="box" data-aos="zoom-in-down" style="background-color: blue;"></div>
    <div class="box" data-aos="zoom-in-left" style="background-color: navy;"></div>
    <div class="box" data-aos="zoom-in-right" style="background-color: purple;"></div>
    <div class="box" data-aos="zoom-out" style="background-color: pink;"></div>
    <div class="box" data-aos="zoom-out-up" style="background-color: plum;"></div>
    <div class="box" data-aos="zoom-out-down" style="background-color: palevioletred;"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
