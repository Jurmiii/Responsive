<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-1{
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            position: relative;
        }
        .box-2{
            width: 100px;
            height: 100px;
            background-color: lightskyblue;
            position: relative;
        }
    </style>
</head>
<body>
    <p class="text1">작동을 하게 하는 방법</p>
    <button class="hide-btn">Hide</button>
    <button class="show-btn">Show</button>
    <button class="toggle-btn">Toggle</button>
    <hr>
    <p class="text2">완전 애니메이션</p>
    <button class="fade-in">Fade In</button>
    <button class="fade-out">Fade Out</button>
    <button class="fade-toggle">Fade Toggle</button>
    <!-- jQuery -->
    <hr>
    <p class="text3">슬라이드?</p>
    <button class="slide-down">Down</button>
    <button class="slide-up">Up</button>
    <button class="slide-toggle">Toggle</button>
    <hr>
    <button class="ani-btn">Move!</button>
    <div class="box-1"></div>
    <script src="js/libs/jquery.min.js"></script>
    <script src="js/script.js"></script>
    <hr>
    <button class="mot-btn">Motion!</button>
    <div class="box-2">글자크기</div>

    <script src="js/libs/jquery.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
