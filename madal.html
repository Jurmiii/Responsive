<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .popup{
            background-color: coral;
            color: white;
            width: 30%;
            height: 300px;
        }

        .popup-bg{
            background-color: rgba(0,0,0,.5);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
        }

        .popup-title a{
            position: relative;
            color: #000;
            background-color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 100px;
            
        }
    </style>
</head>

<body>
    <button class="event-btn">이벤트를 확인해주세요!</button>

    <div class="popup-bg">
        <div class="popup">
            <div class="popup-title">
                <span><a href="#"></a>X</span>
            </div>
            <div class="popup-body">
            <h3>이벤트에 당첨 되셨습니다.</h3>
        </div>
        </div>
    </div>

    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(".popup-title a").click(function(){
            $(".popup-bg").fadeOut()
        })
        $(".event-btn").click(function(){
            $(".popup-bg").fadeIn()
        })
    </script>
</body>

</html>
