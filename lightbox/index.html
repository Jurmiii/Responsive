<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 300vh;
            font-family: sans-serif;
        }

        .kv {
            position: relative;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .kv h2 {
            position: relative;
            z-index: 2;
            font-size: 48px;
            color: #000;
            text-align: center;
        }

        .kv-title-img {
            position: absolute;

            bottom: -30%;
            /* ⭐ 핵심: 30%만 보이게 */

            left: 50%;
            transform: translateX(-50%) scale(0.8);
            /* ⭐ 80% */

            width: 100%;
            z-index: 1;
        }

        .kv-title-img img {
            width: 100%;
            display: block;
        }
    </style>
</head>


</style>
</head>

<body>
    <section class="kv">
        <h2>한화의 담대한 도전은 멈추지 않습니다.</h2>

        <div class="kv-title-img">
            <img src="assets/images/about-img-discover.png" alt="">
        </div>
    </section>



    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".kv",
                start: "top top",
                end: "+=150%",
                scrub: true,
                pin: true
            }
        });

        /* 이미지 */
        tl.to(".kv-title-img", {
            bottom: "0%",     // 올라오기
            scale: 1,         // 80% → 100%
            ease: "none"
        })

            /* 텍스트 */
            .to(".kv h2", {
                color: "#fff",
                ease: "none"
            }, "-=0.4");

    </script>

</body>

</html>
