<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll/bundled/locomotive-scroll.css" />

    <style>
        body {
            margin: 0;
        }

        section {
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-size: 30px;
        }

        .sec1 {
            background-color: purple;
        }

        .sec2 {
            background-color: palevioletred;
        }

        p {
            opacity: 0;
            transform: translateY(50px);
            transition: 0.5s;
        }


        p.active {
            opacity: 1;
            transform: translateY(0);
        }

        .sec4 {
            min-height: 180vh;
            font-size: 30px;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 120px;
            gap: 50px;
        }

        .sec4 h1 {
            margin: 0;
            perspective: 1000px;
            /* 텍스트는 처음부터 보이도록 opacity를 1로 고정합니다. */
            opacity: 1;
            /* transition: 스크롤 속도와 상관없이 애니메이션이 일정한 속도로 진행됩니다. */
            transition: transform 0.3s ease-out;
            /* rotate3d(x, y, z, angle): X축 중심으로 회전하며 위에서 아래로 펼쳐지는 효과 */
            /* clamp는 최소값과 최대값 사이로 값을 제한하여 순차적 등장을 만듭니다. */
            transform: rotate3d(1, 0, 0, clamp(-90deg, -90deg + (var(--progress, 0) - calc(var(--item-index, 0) / 8)) / (calc((var(--item-index, 0) + 1) / 8) - calc(var(--item-index, 0) / 8)) * 90deg, 0deg));
        }
    </style>
</head>

<body>
    <!-- div로 감싸는 이유 : div 안에서만 효과를 줄거라는 의미 -->
    <div data-scroll-container>
        <section class="sec1" data-scroll-section>
            <h1>시작 화면</h1>
        </section>
        <section class="sec2" data-scroll-section>
            <p class="fade" data-scroll data-scroll-class="active">스크롤하면 등장합니다</p>
        </section>
        <section class="sec3" data-scroll-section>
            <div>
                <h1>
                    <!-- data-scroll는 locomotive 요소에 반드시 있어야 합니다. -->
                    <!-- data-scroll-speed는 스크롤에 따라 요소의 움직임 속도를 조절합니다. -->
                    <img src="images/bg-1.jpg" alt="" data-scroll data-scroll-speed="0.5"
                        style="display:block; max-width:100%;" />
                </h1>
            </div>
        </section>
        <section class="sec4" data-scroll-section>
            <!-- sec4의 각 h1은 아래와 같이 순차적으로 나타납니다. -->
            <!-- data-scroll-css-progress는 스크롤 진행률을 CSS 변수(--progress)로 전달합니다. -->
            <!-- data-scroll-offset는 요소가 보이기 시작할 위치와 끝나는 위치를 제어합니다. -->
            <!-- 첫 번째 텍스트는 다음 텍스트 시작점 직전까지 애니메이션됩니다. -->
            <h1 data-scroll data-scroll-css-progress="--progress" data-scroll-offset="0,10%">지금까지</h1>
            <h1 data-scroll data-scroll-css-progress="--progress" data-scroll-offset="10%,50%">스크롤 트리거가</h1>
            <h1 data-scroll data-scroll-css-progress="--progress" data-scroll-offset="20%,50%">작동하는 애니메이션</h1>
            <!-- 네 번째 텍스트의 오프셋을 세 번째와 같이 30% 범위로 맞췄습니다. -->
            <h1 data-scroll data-scroll-css-progress="--progress" data-scroll-offset="30%,60%">입니다.</h1>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll/bundled/locomotive-scroll.min.js"></script>
    <script>
        const locomotiveScroll = new LocomotiveScroll({
            el: document.querySelector('[data-scroll-container]'),
            smooth: true,
            lerp: 0.1,
        });

        /* sec4의 각 h1에 --item-index를 설정하여 순차적 애니메이션을 구현합니다. */
        const sec4h1s = document.querySelectorAll('.sec4 h1');
        sec4h1s.forEach((h1, index) => {
            h1.style.setProperty('--item-index', index);
        });
    </script>
</body>

</html>
