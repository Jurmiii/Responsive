<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .panel {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
        }

        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="panel"><img src="images/bg-1.jpg" alt="1"></section>
        <section class="panel"><img src="images/bg-2.jpg" alt="2"></section>
        <section class="panel"><img src="images/bg-3.jpg" alt="3"></section>
        <section class="panel"><img src="images/bg-4.jpg" alt="4"></section>
        <section class="panel"><img src="images/bg-5.jpg" alt="5"></section>
        <section class="panel"><img src="images/bg-6.jpg" alt="6"></section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Observer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger, Observer, ScrollSmoother);

        let section = document.querySelectorAll(".panel"),
            currentIndex = -1,
            animating = false;

        gotoSection(0, 1);

        function gotoSection(index, direction) {
            if (index < 0 || index >= section.length || animating) return;

            animating = true;
            let fromTop = direction === -1;

            let tl = gsap.timeline({
                onComplete: () => animating = false
            });

            tl.set(section[index], { autoAlpha: 1, yPercent: fromTop ? -100 : 100 })
                .to(section[index], { duration: 1, yPercent: 0, ease: "power2.inOut" });

            if (currentIndex >= 0) {
                gsap.to(section[currentIndex], { duration: 1, yPercent: fromTop ? 100 : -100, autoAlpha: 0 });
            }

            currentIndex = index;

            Observer.create({
                type: "wheel,touch,pointer",
                wheelSpeed: -1,
                onDown: () => !animating && gotoSection(currentIndex + 1, 1),
                onUp: () => !animating && gotoSection(currentIndex - 1, -1),
                tolerance: 10
            });
        }
    </script>
</body>

</html>
