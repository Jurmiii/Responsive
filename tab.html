<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0;}

        body{box-sizing: border-box;}
        
        a{color: inherit; text-decoration: none;}

        li{list-style: none;}

        .container{width: 1440px; margin: auto;}

        .tab-title>ul{display: flex;}

        .tab-title li{width: 33%; text-align: center; padding: 20px 0;}

        .line-active{border-bottom: 1px solid salmon;}

        .tab-body div{
            width: 100%;
            text-align: center;
            background-color: aquamarine;
            height: 400px;
        }

        .tab-body-2, .tab-body-3{
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tab-title">
            <ul>
                <li class="tab-title-1 line-active"><a href="#">TAB-1</a></li>
                <li class="tab-title-2 line-active"><a href="#">TAB-2</a></li>
                <li class="tab-title-3 line-active"><a href="#">TAB-3</a></li>
            </ul>
        </div>
        <div class="tab-body">
            <div class="tab-body-1">
                <h2>body1</h2>
            </div>
            <div class="tab-body-2">
                <h2>body2</h2>
            </div>
            <div class="tab-body-3">
                <h2>body3</h2>
            </div>
        </div>
    </div>
    
    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(function(){
            // $(".tab-title-2").click(function(){
            //     $(".tab-body-2").css("display","block");
            //     $(".tab-body-1").css("display",none);
            // })
            // $(".tab-title-2").click(function(){
            //     $(".tab-body-1").css("display","block");
            //     $(".tab-body-2").css("display",none);
            // })
            $(".tab-title li").click(function(){
                let index = $(this).index();
                // li 요소에 번호를 부여
                $(".tab-title li").removeClass("line-active");
                // li 요소를 클릭하면 일단 먼저 속성을 끔
                $(this).addClass("line-active");
                // 끔과 동시에 다시 클릭한 요소에 클래스 추가
                $(".tab-body > div").hide();
                $(".tab-body > div").dq(index).show();
            })
        })
    </script>

</body>
</html>
